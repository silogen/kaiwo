name: compile-release
on:
  push:
    tags:
    - "v*"
  workflow_dispatch:  # Manual trigger for testing
    inputs:
      test_mode:
        description: 'Run in test mode (no publishing)'
        type: boolean
        default: false
      version:
        description: 'Version to use for testing'
        required: false
        default: 'v0.1.7-test'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    - name: Set up Helm
      uses: azure/setup-helm@v4.3.0

    - name: Extract version from tag
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          echo "TEST_MODE=${{ github.event.inputs.test_mode }}" >> $GITHUB_ENV
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "TEST_MODE=false" >> $GITHUB_ENV
        fi
        echo "Using version: ${VERSION}"
        echo "Test mode: ${TEST_MODE}"

    - name: Run build script for CLI
      shell: bash
      run: |
        set -e
        chmod +x build_cli_all_arch.sh
        ./build_cli_all_arch.sh "$VERSION"

    - name: Compress workloads
      shell: bash
      run: |
        zip -r workloads.zip ./workloads

    - name: Log in to GitHub Container Registry
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

    - name: Build and push operator image
      run: |
        IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/kaiwo-operator
        TAG=${{ env.VERSION }}

        # Build the Docker image
        make docker-build IMG=$IMAGE_NAME:$TAG

        # Push the image (skip in test mode)
        if [ "${{ env.TEST_MODE }}" != "true" ]; then
          make docker-push IMG=$IMAGE_NAME:$TAG
        else
          echo "Skipping image push (test mode)"
        fi

    - name: Generate install.yaml
      run: |
        make build-installer TAG=${{ env.VERSION }}
        cp dist/install.yaml install.yaml

    - name: Package Helm chart
      run: |
        make helm-release TAG=${{ env.VERSION }} CHART_VERSION=${{ env.VERSION }}

    - name: Push Helm chart to OCI registry
      run: |
        if [ "${{ env.TEST_MODE }}" != "true" ]; then
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u $GITHUB_ACTOR --password-stdin
          make helm-push-oci TAG=${{ env.VERSION }} CHART_VERSION=${{ env.VERSION }}
        else
          echo "Skipping Helm chart push (test mode)"
        fi

    - name: Upload install.yaml artifact
      uses: actions/upload-artifact@v4
      with:
        name: install-yaml
        path: install.yaml

    - name: Upload Helm chart artifact
      uses: actions/upload-artifact@v4
      with:
        name: helm-chart
        path: dist/kaiwo-operator-*.tgz

    - name: Create draft release and upload assets
      if: env.TEST_MODE != 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          builds/*
          workloads.zip
          install.yaml
          dist/kaiwo-operator-*.tgz
        token: '${{ secrets.GITHUB_TOKEN }}'
        draft: true
        prerelease: true
        body: |
          ## Installation

          ### Kubernetes Install (kubectl)
          ```bash
          kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/install.yaml
          ```

          ### Helm Install (from GitHub Releases)
          ```bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/kaiwo-operator-${{ env.VERSION }}.tgz -o kaiwo-operator.tgz
          helm install kaiwo kaiwo-operator.tgz
          ```

          ### Helm Install (from OCI Registry)
          ```bash
          helm install kaiwo oci://ghcr.io/${{ github.repository_owner }}/kaiwo-operator --version ${{ env.VERSION }}
          ```

          ### Docker Images
          - Operator: `ghcr.io/${{ github.repository_owner }}/kaiwo-operator:${{ env.VERSION }}`

