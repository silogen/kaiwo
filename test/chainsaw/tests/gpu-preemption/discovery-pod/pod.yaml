apiVersion: v1
kind: Pod
metadata:
  name: gpu-preemption-discover-pod
  annotations:
    kaiwo.silogen.ai/gpu-preemption.enabled: "true"
spec:
  containers:
  - name: workload
    image: busybox:latest
    command: ["sleep", "600"]
    resources:
      requests:
        amd.com/gpu: "1"
      limits:
        amd.com/gpu: "1"
  restartPolicy: Never
