# busybox + amd.com/gpu is intentional: the GPU is never used so the workload
# stays Idle, making it a preemption victim when the demand job creates pressure.
# ($node_gpus) comes from the probe script in chainsaw-test.yaml (largest schedulable count on a node).
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-kueue-victim
  annotations:
    kaiwo.silogen.ai/gpu-preemption.policy: "OnPressure"
    kaiwo.silogen.ai/gpu-preemption.enabled: "true"
    kaiwo.silogen.ai/gpu-preemption.grace-period: "15s"
  labels:
    kueue.x-k8s.io/queue-name: kaiwo
spec:
  template:
    spec:
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: ($node_gpus)
          limits:
            amd.com/gpu: ($node_gpus)
      restartPolicy: Never
