apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-gpu-preemption-kueue-pressure
spec:
  concurrent: false
  steps:
  - name: create-victim-and-wait-idle
    description: >
      Probe schedulable amd.com/gpu count, apply KaiwoQueueConfig slice + victim Job,
      wait for GpuWorkload Idle, then record the victim pod node for the demand Job.
    try:
    - script:
        timeout: 90s
        env:
        - name: NS
          value: ($namespace)
        content: |
          max_alloc=$(kubectl get nodes -o jsonpath='{range .items[*]}{.status.allocatable.amd\.com/gpu}{"\n"}{end}' | awk 'NF{if($1+0>m)m=$1+0}END{printf "%d",m}')
          if [ "$max_alloc" -eq 0 ] 2>/dev/null; then
            echo "ERROR: no amd.com/gpu resources found in cluster" >&2
            exit 1
          fi
          for n in $(seq "$max_alloc" -1 1); do
            kubectl delete pod gpu-probe-kueue -n "$NS" --ignore-not-found --grace-period=1 >/dev/null 2>&1
            OVR=$(printf '{"spec":{"containers":[{"name":"p","image":"busybox","command":["sleep","300"],"resources":{"requests":{"amd.com/gpu":"%d"},"limits":{"amd.com/gpu":"%d"}}}]}}' "$n" "$n")
            kubectl run gpu-probe-kueue -n "$NS" --image=busybox --restart=Never --overrides="$OVR" >/dev/null 2>&1
            if kubectl wait pod/gpu-probe-kueue -n "$NS" --for=condition=PodScheduled --timeout=10s >/dev/null 2>&1; then
              kubectl delete pod/gpu-probe-kueue -n "$NS" --ignore-not-found --grace-period=1 >/dev/null 2>&1
              mkdir -p /tmp/chainsaw-on-pressure-kueue
              printf "%d" "$n" > /tmp/chainsaw-on-pressure-kueue/node_gpus
              printf "%d" "$n"
              exit 0
            fi
          done
          kubectl delete pod/gpu-probe-kueue -n "$NS" --ignore-not-found --grace-period=1 >/dev/null 2>&1
          echo "ERROR: no schedulable GPU count found" >&2
          exit 1
        outputs:
        - name: node_gpus
          value: ($stdout)

    - apply:
        file: kaiwoqueueconfig-gpu-pressure.yaml

    - apply:
        file: job-victim-kueue.yaml
    - sleep:
        duration: 20s

    # GpuWorkload follows pods; Kueue can delay pod creation after the Job exists.
    # Do not use `kubectl wait` alone: if no pod matches the selector yet, kubectl
    # exits immediately with "no matching resources found" instead of waiting.
    # 150 × 2s ≈ 300s plus kubectl — Chainsaw SIGKILLs at step timeout; keep margin.
    - script:
        timeout: 540s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          n=0
          for _ in $(seq 1 150); do
            n=$((n + 1))
            if [ "$((n % 30))" -eq 0 ]; then
              echo "  ...waiting for victim pod PodScheduled ($n/150)" >&2
            fi
            sched=$(kubectl get pods -n "$NS" -l job-name=gpu-preemption-kueue-victim -o jsonpath='{.items[0].status.conditions[?(@.type=="PodScheduled")].status}' 2>/dev/null || true)
            if [ "$sched" = "True" ]; then
              echo "victim pod is PodScheduled" >&2
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for victim pod PodScheduled" >&2
          kubectl get jobs,pods -n "$NS" -o wide >&2 || true
          kubectl get workloads -n "$NS" -o wide >&2 || true
          exit 1

    # Phase stays Active until the metrics scraper has written samples; poll
    # instead of asserting Idle immediately (see computePhase nil aggregate).
    # Worst case: 80 × 3s sleep + kubectl — keep script timeout above ~240s + slack.
    - script:
        timeout: 420s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          p=""
          for _ in $(seq 1 80); do
            for item in $(kubectl get gpuworkloads -n "$NS" -o name 2>/dev/null); do
              ref=$(kubectl get "$item" -n "$NS" -o jsonpath='{.spec.workloadRef.name}' 2>/dev/null || true)
              if [ "$ref" = "gpu-preemption-kueue-victim" ]; then
                p=$(kubectl get "$item" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null || true)
                break
              fi
            done
            if [ "$p" = "Idle" ]; then
              exit 0
            fi
            sleep 3
          done
          echo "GpuWorkload for gpu-preemption-kueue-victim never reached Idle (last phase: ${p:-none})" >&2
          kubectl get jobs,pods,gpuworkloads,workloads -n "$NS" -o wide >&2 || true
          exit 1

    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          NODE=$(kubectl get pods -n "$NS" -l job-name=gpu-preemption-kueue-victim -o jsonpath='{.items[0].spec.nodeName}')
          printf "%s" "$NODE" > /tmp/chainsaw-on-pressure-kueue/victim_node
          printf "%s" "$NODE"
        outputs:
        - name: victim_node
          value: ($stdout)

    # Must exceed grace-period (15s in job-victim-kueue.yaml) so the idle timer
    # expires before the demand Job is applied in the next step.
    - sleep:
        duration: 20s

    catch:
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          kubectl get jobs,pods,workloads,gpuworkloads -n "$NS" -o wide || true
          kubectl describe job gpu-preemption-kueue-victim -n "$NS" 2>/dev/null || true

  - name: create-demand-and-verify-kueue-pressure
    description: >
      Re-bind GPU count and victim node, create demand Job. Kueue may admit the
      Workload (QuotaReserved/Admitted True) while GpuWorkload still reflects
      pressure phases; verify demand GpuWorkload progresses and victim is preempted.
    try:
    - script:
        content: |
          printf "%s" "$(cat /tmp/chainsaw-on-pressure-kueue/node_gpus)"
        outputs:
        - name: node_gpus
          value: ($stdout)
    - script:
        content: |
          printf "%s" "$(cat /tmp/chainsaw-on-pressure-kueue/victim_node)"
        outputs:
        - name: victim_node
          value: ($stdout)

    - apply:
        file: job-demand-kueue.yaml

    # Wait until Kueue has created the demand Workload (do not require QuotaReserved=False:
    # with enough quota / after preemption, Kueue commonly sets QuotaReserved=True).
    - script:
        timeout: 180s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          for _ in $(seq 1 60); do
            for wl in $(kubectl get workloads -n "$NS" -o name 2>/dev/null); do
              owner=$(kubectl get "$wl" -n "$NS" -o jsonpath='{.metadata.ownerReferences[?(@.kind=="Job")].name}' 2>/dev/null || true)
              if [ "$owner" = "gpu-preemption-kueue-demand" ]; then
                echo "demand Kueue Workload exists: $wl" >&2
                exit 0
              fi
            done
            sleep 3
          done
          echo "Timed out: no Kueue Workload owned by Job gpu-preemption-kueue-demand" >&2
          kubectl get workloads,jobs -n "$NS" -o wide >&2 || true
          exit 1

    # Avoid ambiguous GpuWorkload matching when victim and demand both exist.
    # After admission the demand pod may schedule quickly; phase can be PendingGpu,
    # Active, or Idle (metrics) — all indicate the GpuWorkload CR is live for the demand Job.
    - script:
        timeout: 360s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          for _ in $(seq 1 60); do
            for item in $(kubectl get gpuworkloads -n "$NS" -o name 2>/dev/null); do
              ref=$(kubectl get "$item" -n "$NS" -o jsonpath='{.spec.workloadRef.name}' 2>/dev/null || true)
              [ "$ref" = "gpu-preemption-kueue-demand" ] || continue
              phase=$(kubectl get "$item" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null || true)
              case "$phase" in
                PendingGpu|Active|Idle) exit 0 ;;
              esac
            done
            sleep 3
          done
          echo "demand GpuWorkload never reached a post-submit phase (PendingGpu|Active|Idle); last=$phase" >&2
          kubectl get gpuworkloads,workloads -n "$NS" -o wide >&2 || true
          exit 1

    - script:
        timeout: 360s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          for _ in $(seq 1 60); do
            for item in $(kubectl get gpuworkloads -n "$NS" -o name 2>/dev/null); do
              ref=$(kubectl get "$item" -n "$NS" -o jsonpath='{.spec.workloadRef.name}' 2>/dev/null || true)
              [ "$ref" = "gpu-preemption-kueue-victim" ] || continue
              phase=$(kubectl get "$item" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null || true)
              if [ "$phase" = "Preempted" ]; then
                exit 0
              fi
            done
            sleep 3
          done
          echo "victim GpuWorkload never reached Preempted" >&2
          kubectl get gpuworkloads,workloads -n "$NS" -o wide >&2 || true
          exit 1

    catch:
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          echo "=== Pods ==="
          kubectl get pods -n "$NS" -o wide
          echo "=== Workloads ==="
          kubectl get workloads -n "$NS" -o yaml
          echo "=== GpuWorkloads ==="
          kubectl get gpuworkloads -n "$NS" -o wide
