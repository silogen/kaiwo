apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-gpu-preemption-kueue-pressure
spec:
  concurrent: false
  steps:
  - name: create-victim-and-wait-idle
    description: >
      Probe schedulable amd.com/gpu count, apply Kueue queue + victim Job,
      wait for GpuWorkload Idle, then record the victim pod node for the demand Job.
    try:
    - script:
        timeout: 90s
        env:
        - name: NS
          value: ($namespace)
        content: |
          max_alloc=$(kubectl get nodes -o jsonpath='{range .items[*]}{.status.allocatable.amd\.com/gpu}{"\n"}{end}' | awk 'NF{if($1+0>m)m=$1+0}END{printf "%d",m}')
          if [ "$max_alloc" -eq 0 ] 2>/dev/null; then
            echo "ERROR: no amd.com/gpu resources found in cluster" >&2
            exit 1
          fi
          for n in $(seq "$max_alloc" -1 1); do
            kubectl delete pod gpu-probe-kueue -n "$NS" --ignore-not-found --grace-period=1 >/dev/null 2>&1
            OVR=$(printf '{"spec":{"containers":[{"name":"p","image":"busybox","command":["sleep","300"],"resources":{"requests":{"amd.com/gpu":"%d"},"limits":{"amd.com/gpu":"%d"}}}]}}' "$n" "$n")
            kubectl run gpu-probe-kueue -n "$NS" --image=busybox --restart=Never --overrides="$OVR" >/dev/null 2>&1
            if kubectl wait pod/gpu-probe-kueue -n "$NS" --for=condition=PodScheduled --timeout=10s >/dev/null 2>&1; then
              kubectl delete pod/gpu-probe-kueue -n "$NS" --ignore-not-found --grace-period=1 >/dev/null 2>&1
              mkdir -p /tmp/chainsaw-on-pressure-kueue
              printf "%d" "$n" > /tmp/chainsaw-on-pressure-kueue/node_gpus
              printf "%d" "$n"
              exit 0
            fi
          done
          kubectl delete pod/gpu-probe-kueue -n "$NS" --ignore-not-found --grace-period=1 >/dev/null 2>&1
          echo "ERROR: no schedulable GPU count found" >&2
          exit 1
        outputs:
        - name: node_gpus
          value: ($stdout)

    - apply:
        file: kueue-queue.yaml

    - apply:
        file: job-victim-kueue.yaml
    - sleep:
        duration: 20s

    # Phase stays Active until the metrics scraper has written samples; poll
    # instead of asserting Idle immediately (see computePhase nil aggregate).
    # Worst case: 60 iterations × 3s sleep ≈ 177s plus kubectl per loop — must stay
    # below the script timeout or Chainsaw SIGKILLs the shell (looks like flaky Idle).
    - script:
        timeout: 360s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          p=""
          for i in $(seq 1 60); do
            for item in $(kubectl get gpuworkloads -n "$NS" -o name 2>/dev/null); do
              ref=$(kubectl get "$item" -n "$NS" -o jsonpath='{.spec.workloadRef.name}')
              if [ "$ref" = "gpu-preemption-kueue-victim" ]; then
                p=$(kubectl get "$item" -n "$NS" -o jsonpath='{.status.phase}')
                break
              fi
            done
            if [ "$p" = "Idle" ]; then
              exit 0
            fi
            sleep 3
          done
          echo "GpuWorkload for gpu-preemption-kueue-victim never reached Idle (last phase: ${p:-unknown})" >&2
          kubectl get gpuworkloads -n "$NS" -o wide >&2 || true
          exit 1

    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          NODE=$(kubectl get pods -n "$NS" -l job-name=gpu-preemption-kueue-victim -o jsonpath='{.items[0].spec.nodeName}')
          printf "%s" "$NODE" > /tmp/chainsaw-on-pressure-kueue/victim_node
          printf "%s" "$NODE"
        outputs:
        - name: victim_node
          value: ($stdout)

    # Must exceed grace-period (15s in job-victim-kueue.yaml) so the idle timer
    # expires before the demand Job is applied in the next step.
    - sleep:
        duration: 20s

    catch:
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          kubectl get workloads,pods,gpuworkloads -n "$NS" -o wide || true

  - name: create-demand-and-verify-kueue-pressure
    description: >
      Re-bind GPU count and victim node, create demand Job (Kueue cannot reserve quota).
      Verify demand GpuWorkload becomes PendingGpu, victim is preempted.
    try:
    - script:
        content: |
          printf "%s" "$(cat /tmp/chainsaw-on-pressure-kueue/node_gpus)"
        outputs:
        - name: node_gpus
          value: ($stdout)
    - script:
        content: |
          printf "%s" "$(cat /tmp/chainsaw-on-pressure-kueue/victim_node)"
        outputs:
        - name: victim_node
          value: ($stdout)

    - apply:
        file: job-demand-kueue.yaml

    # Chainsaw condition expressions on status.conditions are brittle; verify via kubectl.
    - script:
        timeout: 90s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          for _ in $(seq 1 30); do
            for wl in $(kubectl get workloads -n "$NS" -o name 2>/dev/null); do
              f=$(mktemp) || exit 1
              kubectl get "$wl" -n "$NS" -o jsonpath='{range .status.conditions[*]}{.type}{"\t"}{.status}{"\t"}{.message}{"\n"}{end}' 2>/dev/null >"$f" || true
              # POSIX sh (Chainsaw uses /bin/sh, often dash): no bash "< <( )" process substitution.
              while IFS="$(printf '\t')" read -r typ st msg; do
                [ "$typ" = "QuotaReserved" ] || continue
                [ "$st" = "False" ] || continue
                echo "$msg" | grep -qi 'amd\.com/gpu' && { rm -f "$f"; exit 0; }
              done <"$f"
              rm -f "$f"
            done
            sleep 3
          done
          echo "No Workload with QuotaReserved=False mentioning amd.com/gpu" >&2
          kubectl get workloads -n "$NS" -o yaml >&2 || true
          exit 1

    # Avoid ambiguous GpuWorkload matching when victim and demand both exist.
    - script:
        timeout: 90s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          for _ in $(seq 1 30); do
            for item in $(kubectl get gpuworkloads -n "$NS" -o name 2>/dev/null); do
              ref=$(kubectl get "$item" -n "$NS" -o jsonpath='{.spec.workloadRef.name}' 2>/dev/null || true)
              [ "$ref" = "gpu-preemption-kueue-demand" ] || continue
              phase=$(kubectl get "$item" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null || true)
              if [ "$phase" = "PendingGpu" ]; then
                exit 0
              fi
            done
            sleep 3
          done
          echo "demand GpuWorkload never reached PendingGpu" >&2
          kubectl get gpuworkloads,workloads -n "$NS" -o wide >&2 || true
          exit 1

    - script:
        timeout: 120s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          for _ in $(seq 1 40); do
            for item in $(kubectl get gpuworkloads -n "$NS" -o name 2>/dev/null); do
              ref=$(kubectl get "$item" -n "$NS" -o jsonpath='{.spec.workloadRef.name}' 2>/dev/null || true)
              [ "$ref" = "gpu-preemption-kueue-victim" ] || continue
              phase=$(kubectl get "$item" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null || true)
              if [ "$phase" = "Preempted" ]; then
                exit 0
              fi
            done
            sleep 3
          done
          echo "victim GpuWorkload never reached Preempted" >&2
          kubectl get gpuworkloads,workloads -n "$NS" -o wide >&2 || true
          exit 1

    catch:
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          echo "=== Pods ==="
          kubectl get pods -n "$NS" -o wide
          echo "=== Workloads ==="
          kubectl get workloads -n "$NS" -o yaml
          echo "=== GpuWorkloads ==="
          kubectl get gpuworkloads -n "$NS" -o wide
