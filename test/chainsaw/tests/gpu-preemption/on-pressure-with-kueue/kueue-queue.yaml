apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: default
spec:
  nodeLabels:
    kaiwo/worker: "true"

---

apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: gpu-limited
spec:
  namespaceSelector: {}
  resourceGroups:
  - coveredResources: ["amd.com/gpu"]
    flavors:
    - name: default
      resources:
      - name: amd.com/gpu
        nominalQuota: ($node_gpus)

---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: qa-gpupressure
spec:
  clusterQueue: gpu-limited
