apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-kueue-demand
  annotations:
    kaiwo.silogen.ai/gpu-preemption.enabled: "true"
    kaiwo.silogen.ai/gpu-preemption.policy: "OnPressure"
  labels:
    kueue.x-k8s.io/queue-name: kaiwo
spec:
  template:
    spec:
      # Pin to the victim's node so that once Kueue admits the workload, the
      # pod competes for GPUs on the same node as the victim ($victim_node).
      nodeSelector:
        kubernetes.io/hostname: ($victim_node)
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: ($node_gpus)
          limits:
            amd.com/gpu: ($node_gpus)
      restartPolicy: Never
