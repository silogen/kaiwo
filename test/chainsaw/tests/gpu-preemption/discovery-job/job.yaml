apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-discover-job
  annotations:
    kaiwo.silogen.ai/gpu-preemption.enabled: "true"
spec:
  template:
    spec:
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: "1"
          limits:
            amd.com/gpu: "1"
      restartPolicy: Never
