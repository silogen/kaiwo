apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-gpu-preemption-discovery-kaiwoservice
spec:
  concurrent: true
  steps:
  - name: discover-gpuworkload-for-kaiwoservice
    description: Verify GpuWorkload is created for an annotated KaiwoService (Pod -> ReplicaSet -> Deployment -> KaiwoService chain)
    try:
    - apply:
        file: kaiwoservice.yaml
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: KaiwoService
              name: gpu-preemption-discover-kwsvc
            gpuResources:
              amd.com/gpu: 1
    catch:
    - command:
        entrypoint: kaiwo-dev
        env:
        - name: NAMESPACE
          value: ($namespace)
        - name: PRINT_LEVEL
          value: "debug"
        args: ["debug", "chainsaw", "--namespace=$NAMESPACE", "--print-level=$PRINT_LEVEL"]
  - name: verify-phase-transitions
    description: Verify the reconciler resolves the full owner chain and computes a phase
    try:
    - assert:
        timeout: 120s
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: KaiwoService
              name: gpu-preemption-discover-kwsvc
          status:
            (phase != 'PendingOther'): true
    catch:
    - command:
        entrypoint: kaiwo-dev
        env:
        - name: NAMESPACE
          value: ($namespace)
        - name: PRINT_LEVEL
          value: "debug"
        args: ["debug", "chainsaw", "--namespace=$NAMESPACE", "--print-level=$PRINT_LEVEL"]
