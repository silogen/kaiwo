apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-gpu-preemption-discovery-kaiwoservice
spec:
  concurrent: true
  steps:
  - name: discover-gpuworkload-for-kaiwoservice
    description: >
      Verify GpuWorkload is created for an annotated KaiwoService
      (Pod -> ReplicaSet -> Deployment -> KaiwoService owner chain).
      Phase progression is not asserted because Kueue scheduling gates
      may prevent the pod from running in vcluster dev environments.
    try:
    - apply:
        file: kaiwoservice.yaml

    # GpuWorkload is created only after a qualifying GPU pod exists (Pod watch). If the
    # KaiwoService stays PENDING, the operator has not yet produced pods — give CI time
    # (image pull, quota, etc.). 120 × 3s ≈ 360s sleep + kubectl → keep step timeout above that.
    - script:
        timeout: 540s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          n=0
          for _ in $(seq 1 120); do
            n=$((n + 1))
            if [ "$((n % 20))" -eq 0 ]; then
              kw=$(kubectl get kaiwoservice gpu-preemption-discover-kwsvc -n "$NS" -o jsonpath='{.status.status}' 2>/dev/null || true)
              echo "  ...still waiting for GpuWorkload (KaiwoService.status=$kw, iteration $n/120)" >&2
            fi
            for item in $(kubectl get gpuworkloads -n "$NS" -o name 2>/dev/null); do
              ref=$(kubectl get "$item" -n "$NS" -o jsonpath='{.spec.workloadRef.name}' 2>/dev/null || true)
              kind=$(kubectl get "$item" -n "$NS" -o jsonpath='{.spec.workloadRef.kind}' 2>/dev/null || true)
              if [ "$ref" = "gpu-preemption-discover-kwsvc" ] && [ "$kind" = "KaiwoService" ]; then
                exit 0
              fi
            done
            sleep 3
          done
          echo "Timed out: no GpuWorkload for KaiwoService gpu-preemption-discover-kwsvc yet." >&2
          echo "  (GpuWorkload is created after GPU pods exist; PENDING KaiwoService usually means no pods.)" >&2
          kubectl get kaiwoservice gpu-preemption-discover-kwsvc -n "$NS" -o wide >&2 || true
          kubectl get gpuworkloads,kaiwoservices,deployments,pods -n "$NS" -o wide >&2 || true
          kubectl describe kaiwoservice gpu-preemption-discover-kwsvc -n "$NS" 2>/dev/null | tail -n 80 >&2 || true
          exit 1

    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: KaiwoService
              name: gpu-preemption-discover-kwsvc
            gpuResources:
              amd.com/gpu: 1
    catch:
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          kubectl get gpuworkloads,kaiwoservices,deployments,pods -n "$NS" -o wide 2>&1 || true
          kubectl describe kaiwoservice gpu-preemption-discover-kwsvc -n "$NS" 2>&1 | tail -n 120 || true
