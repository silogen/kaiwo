apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-gpu-preemption-discovery-kaiwoservice
spec:
  concurrent: true
  steps:
  - name: discover-gpuworkload-for-kaiwoservice
    description: >
      Verify GpuWorkload is created for an annotated KaiwoService
      (Pod -> ReplicaSet -> Deployment -> KaiwoService owner chain).
      Phase progression is not asserted because Kueue scheduling gates
      may prevent the pod from running in vcluster dev environments.
    try:
    - apply:
        file: kaiwoservice.yaml
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: KaiwoService
              name: gpu-preemption-discover-kwsvc
            gpuResources:
              amd.com/gpu: 1
    catch:
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          kubectl get gpuworkloads,kaiwoservices,deployments,pods -n "$NS" -o wide 2>&1 || true
