apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-gpu-preemption-discovery-kaiwoservice
spec:
  concurrent: true
  steps:
  - name: discover-gpuworkload-for-kaiwoservice
    description: >
      Verify GpuWorkload is created for an annotated KaiwoService
      (Pod -> ReplicaSet -> Deployment -> KaiwoService owner chain).
      Phase progression is not asserted because Kueue scheduling gates
      may prevent the pod from running in vcluster dev environments.
    try:
    - apply:
        file: kaiwoservice.yaml

    - script:
        timeout: 180s
        env:
        - name: NS
          value: ($namespace)
        content: |
          set -e
          for _ in $(seq 1 60); do
            for item in $(kubectl get gpuworkloads -n "$NS" -o name 2>/dev/null); do
              ref=$(kubectl get "$item" -n "$NS" -o jsonpath='{.spec.workloadRef.name}' 2>/dev/null || true)
              kind=$(kubectl get "$item" -n "$NS" -o jsonpath='{.spec.workloadRef.kind}' 2>/dev/null || true)
              if [ "$ref" = "gpu-preemption-discover-kwsvc" ] && [ "$kind" = "KaiwoService" ]; then
                exit 0
              fi
            done
            sleep 3
          done
          echo "GpuWorkload for KaiwoService gpu-preemption-discover-kwsvc never appeared" >&2
          kubectl get gpuworkloads,kaiwoservices,deployments,pods -n "$NS" -o wide >&2 || true
          exit 1

    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: KaiwoService
              name: gpu-preemption-discover-kwsvc
            gpuResources:
              amd.com/gpu: 1
    catch:
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          kubectl get gpuworkloads,kaiwoservices,deployments,pods -n "$NS" -o wide 2>&1 || true
