# Requires rocm/pytorch:latest (or a compatible ROCm image) to be pullable.
# GpuWorkload uses gpu_gfx_activity; pure GEMM compute often keeps that signal
# below typical idle thresholds. threshold -1 disables utilization-based Idle so
# phase stays Active while the pod is running (see computePhase).
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-active-workload
  annotations:
    kaiwo.silogen.ai/gpu-preemption.policy: "Always"
    kaiwo.silogen.ai/gpu-preemption.grace-period: "15s"
    kaiwo.silogen.ai/gpu-preemption.threshold: "0"
spec:
  template:
    spec:
      containers:
      - name: gpu-stress
        image: rocm/pytorch:latest
        command: ["python3", "-c"]
        args:
        - |
          import signal, sys, torch
          signal.signal(signal.SIGTERM, lambda *_: sys.exit(0))
          d = torch.device('cuda')
          a = torch.randn(4096, 4096, device=d)
          while True:
              a = torch.mm(a, a)
              a = a / a.norm()
        resources:
          requests:
            amd.com/gpu: "1"
          limits:
            amd.com/gpu: "1"
      restartPolicy: Never
