apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-gpu-preemption-multi-victim
spec:
  concurrent: false
  steps:
  - name: idle-two-victims
    description: >
      Deploy two single-GPU victim Jobs and wait for both to become idle past
      the if-idle-after period.
    try:
    - apply:
        file: job-victim-a.yaml
    - apply:
        file: job-victim-b.yaml
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-multi-victim-a
          status:
            phase: Idle
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-multi-victim-b
          status:
            phase: Idle
    # Must exceed if-idle-after (15s) so both victims are eligible.
    - sleep:
        duration: 20s
    catch:
    - command:
        entrypoint: kaiwo-dev
        env:
        - name: NAMESPACE
          value: ($namespace)
        - name: PRINT_LEVEL
          value: "debug"
        args: ["debug", "chainsaw", "--namespace=$NAMESPACE", "--print-level=$PRINT_LEVEL"]
  - name: demand-triggers-multi-victim-preemption
    description: >
      Deploy a demand Job requesting 2 GPUs. The evaluator must accumulate
      both idle victims (1 GPU each) to satisfy the demand. Verify both
      victims are preempted and their Jobs are deleted.
    try:
    - apply:
        file: job-demand.yaml
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-multi-demand
          status:
            phase: PendingGpu
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-multi-victim-a
          status:
            phase: Preempted
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-multi-victim-b
          status:
            phase: Preempted
    - error:
        resource:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: gpu-preemption-multi-victim-a
    - error:
        resource:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: gpu-preemption-multi-victim-b
    catch:
    - command:
        entrypoint: kaiwo-dev
        env:
        - name: NAMESPACE
          value: ($namespace)
        - name: PRINT_LEVEL
          value: "debug"
        args: ["debug", "chainsaw", "--namespace=$NAMESPACE", "--print-level=$PRINT_LEVEL"]
