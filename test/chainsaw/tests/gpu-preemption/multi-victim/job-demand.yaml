# Demand job requesting 2 GPUs. Neither victim alone (1 GPU each) satisfies
# this demand, so the evaluator must accumulate both victims to proceed.
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-multi-demand
  annotations:
    kaiwo.silogen.ai/gpu-preemption.enabled: "true"
    kaiwo.silogen.ai/gpu-preemption.policy: "OnPressure"
spec:
  template:
    spec:
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: "2"
          limits:
            amd.com/gpu: "2"
      restartPolicy: Never
