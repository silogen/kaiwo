# Demand job requesting node_gpus+1 GPUs. Neither victim alone (node_gpus
# GPUs each) satisfies this, so the evaluator must accumulate both victims.
# The demand exceeds per-node capacity and will remain PendingGpu even after
# preemption — the test only verifies that both victims are preempted.
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-multi-demand
  annotations:
    kaiwo.silogen.ai/gpu-preemption.enabled: "true"
    kaiwo.silogen.ai/gpu-preemption.policy: "OnPressure"
spec:
  template:
    spec:
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: ($demand_gpus)
          limits:
            amd.com/gpu: ($demand_gpus)
      restartPolicy: Never
