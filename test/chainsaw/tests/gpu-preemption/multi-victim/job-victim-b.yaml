# busybox + amd.com/gpu is intentional: GPU is never used so the workload
# stays Idle. Each victim saturates a full node so the demand cannot schedule.
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-multi-victim-b
  annotations:
    kaiwo.silogen.ai/gpu-preemption.policy: "OnPressure"
    kaiwo.silogen.ai/gpu-preemption.if-idle-after: "15s"
spec:
  template:
    spec:
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: ($node_gpus)
          limits:
            amd.com/gpu: ($node_gpus)
      restartPolicy: Never
