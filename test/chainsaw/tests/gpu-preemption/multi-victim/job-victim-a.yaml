# busybox + amd.com/gpu is intentional: GPU is never used so the workload
# stays Idle. This is victim A in the multi-victim preemption test.
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-multi-victim-a
  annotations:
    kaiwo.silogen.ai/gpu-preemption.policy: "OnPressure"
    kaiwo.silogen.ai/gpu-preemption.if-idle-after: "15s"
spec:
  template:
    spec:
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: "1"
          limits:
            amd.com/gpu: "1"
      restartPolicy: Never
