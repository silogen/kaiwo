# Demand job requesting an impossible GPU count (9999) to guarantee it stays
# PendingGpu forever. The fit check should prevent the victim from being
# preempted since freeing its 1 GPU would not satisfy this demand.
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-nofit-demand
  annotations:
    kaiwo.silogen.ai/gpu-preemption.enabled: "true"
    kaiwo.silogen.ai/gpu-preemption.policy: "OnPressure"
spec:
  template:
    spec:
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: "9999"
          limits:
            amd.com/gpu: "9999"
      restartPolicy: Never
