apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-gpu-preemption-on-pressure
spec:
  concurrent: false
  steps:
  - name: saturate-and-idle
    description: >
      Probe for actual available GPUs on the largest node (accounts for
      host-level workloads on shared clusters), deploy victim Job saturating
      that node, and wait for it to become idle.
    try:
    - script:
        timeout: 90s
        env:
        - name: NS
          value: ($namespace)
        content: |
          max_alloc=$(kubectl get nodes -o jsonpath='{range .items[*]}{.status.allocatable.amd\.com/gpu}{"\n"}{end}' | awk 'NF{if($1+0>m)m=$1+0}END{printf "%d",m}')
          if [ "$max_alloc" -eq 0 ] 2>/dev/null; then
            echo "ERROR: no amd.com/gpu resources found in cluster" >&2
            exit 1
          fi
          for n in $(seq "$max_alloc" -1 1); do
            kubectl delete pod gpu-probe -n "$NS" --ignore-not-found --grace-period=1 >/dev/null 2>&1
            OVR=$(printf '{"spec":{"containers":[{"name":"p","image":"busybox","command":["sleep","300"],"resources":{"requests":{"amd.com/gpu":"%d"},"limits":{"amd.com/gpu":"%d"}}}]}}' "$n" "$n")
            kubectl run gpu-probe -n "$NS" --image=busybox --restart=Never --overrides="$OVR" >/dev/null 2>&1
            if kubectl wait pod/gpu-probe -n "$NS" --for=condition=PodScheduled --timeout=10s >/dev/null 2>&1; then
              kubectl delete pod gpu-probe -n "$NS" --ignore-not-found --grace-period=1 >/dev/null 2>&1
              mkdir -p /tmp/chainsaw-on-pressure
              printf "%d" "$n" > /tmp/chainsaw-on-pressure/node_gpus
              printf "%d" "$n"
              exit 0
            fi
          done
          kubectl delete pod gpu-probe -n "$NS" --ignore-not-found --grace-period=1 >/dev/null 2>&1
          echo "ERROR: no schedulable GPU count found" >&2
          exit 1
        outputs:
        - name: node_gpus
          value: ($stdout)
    - apply:
        file: job-victim.yaml
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-victim
          status:
            phase: Idle
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          NODE=$(kubectl get pods -n "$NS" -l job-name=gpu-preemption-pressure-victim -o jsonpath='{.items[0].spec.nodeName}')
          printf "%s" "$NODE" > /tmp/chainsaw-on-pressure/victim_node
          printf "%s" "$NODE"
        outputs:
        - name: victim_node
          value: ($stdout)
    # Must exceed grace-period (15s in job-victim.yaml) so the idle timer
    # expires before the demand is applied in the next step.
    - sleep:
        duration: 20s
    catch:
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          kubectl get gpuworkloads,jobs,pods -n "$NS" -o wide 2>&1 || true
  - name: create-demand-and-verify-preemption
    description: >
      Deploy demand Job pinned to the victim's node so it cannot schedule
      while the victim holds the GPUs. Verify victim is preempted.
    try:
    - script:
        content: |
          printf "%s" "$(cat /tmp/chainsaw-on-pressure/node_gpus)"
        outputs:
        - name: node_gpus
          value: ($stdout)
    - script:
        content: |
          printf "%s" "$(cat /tmp/chainsaw-on-pressure/victim_node)"
        outputs:
        - name: victim_node
          value: ($stdout)
    - apply:
        file: job-demand.yaml
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-demand
          status:
            phase: PendingGpu
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-victim
          status:
            phase: Preempted
    - error:
        resource:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: gpu-preemption-pressure-victim
    # vcluster's garbage collector is slow to cascade-delete pods after
    # the Job is removed. Force-delete the orphaned pods so the GPUs are
    # actually freed and the demand can schedule.
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          kubectl delete pods -n "$NS" -l job-name=gpu-preemption-pressure-victim --grace-period=0 --force >/dev/null 2>&1 || true
    - assert:
        timeout: 120s
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-demand
          status:
            (phase != 'PendingGpu'): true
    catch:
    - script:
        env:
        - name: NS
          value: ($namespace)
        content: |
          kubectl get gpuworkloads,jobs,pods -n "$NS" -o wide 2>&1 || true
