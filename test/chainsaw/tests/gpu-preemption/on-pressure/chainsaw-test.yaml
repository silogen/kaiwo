apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-gpu-preemption-on-pressure
spec:
  concurrent: false
  steps:
  - name: detect-cluster-gpus
    description: >
      Auto-detect the max amd.com/gpu count on the largest single node.
      A single pod cannot span nodes, so we use the per-node max rather than
      the cluster-wide sum to ensure the victim pod is actually schedulable.
    try:
    - script:
        content: |
          max_node=$(kubectl get nodes -o jsonpath='{range .items[*]}{.status.allocatable.amd\.com/gpu}{"\n"}{end}' | awk 'NF{if($1+0>m)m=$1+0}END{printf "%d",m}')
          if [ "$max_node" -eq 0 ] 2>/dev/null; then
            echo "ERROR: no amd.com/gpu resources found in cluster" >&2
            exit 1
          fi
          printf "%d" "$max_node"
        outputs:
        - name: node_gpus
          value: ($stdout)
  - name: saturate-and-idle
    description: Deploy victim Job using all GPUs on the largest node and wait for it to become idle
    try:
    - apply:
        file: job-victim.yaml
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-victim
          status:
            phase: Idle
    # Must exceed if-idle-after (15s in job-victim.yaml) so the idle timer
    # expires before the demand is applied in the next step.
    - sleep:
        duration: 20s
    catch:
    - command:
        entrypoint: kaiwo-dev
        env:
        - name: NAMESPACE
          value: ($namespace)
        - name: PRINT_LEVEL
          value: "debug"
        args: ["debug", "chainsaw", "--namespace=$NAMESPACE", "--print-level=$PRINT_LEVEL"]
  - name: create-demand-and-verify-preemption
    description: Deploy demand Job that triggers GPU pressure and verify victim is preempted
    try:
    - apply:
        file: job-demand.yaml
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-demand
          status:
            phase: PendingGpu
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-victim
          status:
            phase: Preempted
    - error:
        resource:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: gpu-preemption-pressure-victim
    - assert:
        timeout: 120s
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-demand
          status:
            (phase != 'PendingGpu'): true
    catch:
    - command:
        entrypoint: kaiwo-dev
        env:
        - name: NAMESPACE
          value: ($namespace)
        - name: PRINT_LEVEL
          value: "debug"
        args: ["debug", "chainsaw", "--namespace=$NAMESPACE", "--print-level=$PRINT_LEVEL"]
