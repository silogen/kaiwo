apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-gpu-preemption-on-pressure
spec:
  concurrent: false
  steps:
  - name: detect-cluster-gpus
    description: Auto-detect total amd.com/gpu count from cluster nodes
    try:
    - script:
        content: |
          total=$(kubectl get nodes -o jsonpath='{range .items[*]}{.status.allocatable.amd\.com/gpu}{"\n"}{end}' | awk 'NF{s+=$1}END{printf "%d",s}')
          if [ "$total" -eq 0 ] 2>/dev/null; then
            echo "ERROR: no amd.com/gpu resources found in cluster" >&2
            exit 1
          fi
          printf "%d" "$total"
        outputs:
        - name: total_gpus
          value: ($stdout)
  - name: saturate-and-idle
    description: Deploy victim Job that uses all cluster GPUs and wait for it to become idle
    try:
    - apply:
        file: job-victim.yaml
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-victim
          status:
            phase: Idle
    - sleep:
        duration: 20s
    catch:
    - command:
        entrypoint: kaiwo-dev
        env:
        - name: NAMESPACE
          value: ($namespace)
        - name: PRINT_LEVEL
          value: "debug"
        args: ["debug", "chainsaw", "--namespace=$NAMESPACE", "--print-level=$PRINT_LEVEL"]
  - name: create-demand-and-verify-preemption
    description: Deploy demand Job that triggers GPU pressure and verify victim is preempted
    try:
    - apply:
        file: job-demand.yaml
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-demand
          status:
            phase: PendingGpu
    - assert:
        resource:
          apiVersion: kaiwo.silogen.ai/v1alpha1
          kind: GpuWorkload
          spec:
            workloadRef:
              kind: Job
              name: gpu-preemption-pressure-victim
          status:
            phase: Preempted
    - error:
        resource:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: gpu-preemption-pressure-victim
    catch:
    - command:
        entrypoint: kaiwo-dev
        env:
        - name: NAMESPACE
          value: ($namespace)
        - name: PRINT_LEVEL
          value: "debug"
        args: ["debug", "chainsaw", "--namespace=$NAMESPACE", "--print-level=$PRINT_LEVEL"]
