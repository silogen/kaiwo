apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-pressure-victim
  annotations:
    kaiwo.silogen.ai/gpu-preemption.policy: "OnPressure"
    kaiwo.silogen.ai/gpu-preemption.if-idle-after: "15s"
spec:
  template:
    spec:
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: ($total_gpus)
          limits:
            amd.com/gpu: ($total_gpus)
      restartPolicy: Never
