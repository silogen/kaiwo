apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-pressure-demand
  annotations:
    kaiwo.silogen.ai/gpu-preemption.enabled: "true"
    kaiwo.silogen.ai/gpu-preemption.policy: "OnPressure"
spec:
  template:
    spec:
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: ($values.total_gpus)
          limits:
            amd.com/gpu: ($values.total_gpus)
      restartPolicy: Never
