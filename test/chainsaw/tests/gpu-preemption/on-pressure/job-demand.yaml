apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-preemption-pressure-demand
  annotations:
    kaiwo.silogen.ai/gpu-preemption.enabled: "true"
    kaiwo.silogen.ai/gpu-preemption.policy: "OnPressure"
spec:
  template:
    spec:
      # Pin to the victim's node so the demand is unschedulable while the
      # victim holds the GPUs; after preemption the demand can schedule here.
      nodeSelector:
        kubernetes.io/hostname: ($victim_node)
      containers:
      - name: workload
        image: busybox:latest
        command: ["sleep", "600"]
        resources:
          requests:
            amd.com/gpu: ($node_gpus)
          limits:
            amd.com/gpu: ($node_gpus)
      restartPolicy: Never
