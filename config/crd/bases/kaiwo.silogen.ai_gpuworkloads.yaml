---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.1
  name: gpuworkloads.kaiwo.silogen.ai
spec:
  group: kaiwo.silogen.ai
  names:
    kind: GpuWorkload
    listKind: GpuWorkloadList
    plural: gpuworkloads
    singular: gpuworkload
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - format: float
      jsonPath: .status.aggregatedUtilization
      name: Utilization
      type: number
    - jsonPath: .status.idleSince
      name: Idle Since
      type: date
    - jsonPath: .spec.workloadRef.kind
      name: Owner
      type: string
    - jsonPath: .spec.workloadRef.name
      name: OwnerName
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          GpuWorkload tracks a GPU workload for utilization monitoring and preemption.
          One GpuWorkload CR is created per tracked root-owner resource. The CR persists
          after the workload is deleted, providing audit history and preemption records.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GpuWorkloadSpec defines the desired state of a tracked GPU
              workload.
            properties:
              aggregationPolicy:
                description: |-
                  AggregationPolicy overrides the cluster-wide default (GPU_PREEMPTION_DEFAULT_AGGREGATION).
                  Determines how utilization across multiple pods is aggregated.
                enum:
                - Min
                - Max
                - Avg
                type: string
              gpuResources:
                additionalProperties:
                  type: integer
                description: |-
                  GpuResources maps GPU resource names to the total count requested across
                  all pods belonging to this workload.
                  Example: {"amd.com/gpu": 4} or {"amd.com/gpu": 2, "amd.com/gpu-0": 4}.
                  Used for resource-name-aware pressure matching and capacity-aware fit
                  checks during preemption evaluation.
                type: object
              gracePeriod:
                description: |-
                  GracePeriod overrides the cluster-wide default (GPU_PREEMPTION_DEFAULT_GRACE_PERIOD).
                  The workload must be idle for at least this duration before becoming preemptible.
                type: string
              preemptionPolicy:
                description: PreemptionPolicy overrides the cluster-wide default (GPU_PREEMPTION_DEFAULT_POLICY).
                enum:
                - OnPressure
                - Always
                type: string
              ttlAfterFinished:
                description: |-
                  TTLAfterFinished controls how long this CR is retained after the workload
                  reaches a terminal phase (Preempted or Deleted).
                  Falls back to GPU_PREEMPTION_DEFAULT_TTL. Use "0" to retain forever.
                type: string
              utilizationThreshold:
                description: |-
                  UtilizationThreshold overrides the cluster-wide default (GPU_PREEMPTION_DEFAULT_THRESHOLD).
                  Utilization below this percentage is considered idle.
                type: number
              workloadRef:
                description: WorkloadRef identifies the root owner resource being
                  tracked.
                properties:
                  apiVersion:
                    minLength: 1
                    type: string
                  kind:
                    minLength: 1
                    type: string
                  name:
                    minLength: 1
                    type: string
                  uid:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    type: string
                required:
                - apiVersion
                - kind
                - name
                - uid
                type: object
            required:
            - gpuResources
            - workloadRef
            type: object
          status:
            description: GpuWorkloadStatus defines the observed state of a tracked
              GPU workload.
            properties:
              aggregatedUtilization:
                description: |-
                  AggregatedUtilization is computed by the reconciler from TrackedPods
                  using the configured AggregationPolicy.
                type: number
              conditions:
                description: Conditions follows standard Kubernetes condition conventions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              finishedAt:
                description: |-
                  FinishedAt records when a terminal phase (Preempted or Deleted) was entered.
                  Used together with TTLAfterFinished for automatic CR cleanup.
                format: date-time
                type: string
              idleSince:
                description: IdleSince records when the workload first entered the
                  Idle phase.
                format: date-time
                type: string
              lastMetricsUpdate:
                description: LastMetricsUpdate records the last time the scraper wrote
                  utilization data.
                format: date-time
                type: string
              ownerChain:
                description: |-
                  OwnerChain describes the owner reference path from pod to root owner.
                  Example: "Pod/worker-0 -> Job/training -> KaiwoJob/my-job"
                type: string
              phase:
                description: Phase is the current lifecycle phase of the tracked workload.
                enum:
                - PendingGpu
                - PendingOther
                - Active
                - Idle
                - Preempting
                - Preempted
                - Deleted
                - ""
                type: string
              preemptedAt:
                description: PreemptedAt records when the preemption was initiated.
                format: date-time
                type: string
              preemptedFor:
                description: |-
                  PreemptedFor holds the name of the pending GpuWorkload this workload was
                  preempted to make room for.
                type: string
              preemptionReason:
                description: |-
                  PreemptionReason provides a human-readable explanation of why the workload
                  was preempted.
                type: string
              trackedPods:
                description: |-
                  TrackedPods lists pods currently owned by this workload together with
                  per-GPU utilization metrics. Pod entries are maintained by the reconciler;
                  metrics within each pod are updated by the scraper.
                items:
                  description: |-
                    TrackedPod represents a pod owned by this workload together with its
                    per-GPU utilization metrics.  Pod entries are maintained by the reconciler;
                    metrics within each pod are updated by the scraper.
                  properties:
                    gpuMetrics:
                      items:
                        description: GpuMetric holds a utilization sample for a single
                          GPU.
                        properties:
                          gpuId:
                            type: string
                          lastUpdate:
                            format: date-time
                            type: string
                          utilization:
                            maximum: 100
                            minimum: 0
                            type: number
                        required:
                        - lastUpdate
                        - utilization
                        type: object
                      type: array
                    podName:
                      type: string
                  required:
                  - podName
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
